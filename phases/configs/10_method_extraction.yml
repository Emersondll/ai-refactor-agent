skill: method-extraction
description: Extract methods longer than 30 lines into private helpers with descriptive names
tool: llm
method_level: true
skill_name: java-method-extraction
skill_section: LLM INSTRUCTIONS
detect_pattern: long_method
min_lines: 80
max_agent: standard
skip_dep_context: true
review_criteria: |
  The diff must ONLY extract sub-blocks of long methods into private helper methods.
  REJECT if: logic changed, public or protected signatures modified,
  imports added without need, different behavior,
  or methods with fewer than 5 lines were unnecessarily extracted.
