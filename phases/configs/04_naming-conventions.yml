skill: naming-conventions
description: Rename identifiers to follow Java conventions (camelCase/PascalCase)
tool: openrewrite
artifact_coordinates:
  - org.openrewrite.recipe:rewrite-static-analysis:RELEASE
recipes:
  - org.openrewrite.staticanalysis.MethodNameCasing
  - org.openrewrite.staticanalysis.LocalVariableNameCasing
review_criteria: |
  The diff must ONLY rename methods or variables that violate Java conventions.
  Field names and type names must not be changed by this skill.
  REJECT if: logic changed, or any rename that could break the public API.
