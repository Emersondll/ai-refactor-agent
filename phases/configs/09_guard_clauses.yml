skill: guard-clauses
description: Apply Guard Clauses — replace nested ifs (depth >= 3) with early return
tool: llm
method_level: true
skill_name: java-guard-clauses
skill_section: LLM INSTRUCTIONS
detect_pattern: nested_if
min_lines: 30
max_agent: standard
skip_dep_context: true
review_criteria: |
  The diff must ONLY restructure nested if-else blocks using early return (guard clauses).
  REJECT if: business logic changed, method signatures modified,
  imports added or removed, runtime behavior different,
  or methods that were already flat (depth < 3) were touched.
