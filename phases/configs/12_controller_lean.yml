skill: controller-lean
description: Apply SRP to @RestController — remove business logic from handlers, delegate to Service
tool: llm
method_level: true
skill_name: java-controller-lean
skill_section: LLM INSTRUCTIONS
detect_pattern: controller_logic
min_lines: 0
max_agent: standard
skip_dep_context: true
review_criteria: |
  The diff must ONLY remove business logic (if/else, loops, calculations) from handler methods.
  REJECT if: HTTP mappings changed, different status codes, @Valid removed,
  new methods created in the Service, or different HTTP behavior.
  APPROVE if: the controller became leaner by delegating to the service without changing the HTTP API.
