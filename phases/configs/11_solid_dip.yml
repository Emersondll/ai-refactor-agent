skill: solid-dip
description: Apply DIP — replace direct instantiation (new ConcreteService) with constructor injection
tool: llm
method_level: false
class_level: true
skill_name: java-solid-dip
skill_section: LLM INSTRUCTIONS
detect_pattern: concrete_new
min_lines: 0
max_agent: standard
skip_dep_context: true
skip_compression: true
review_criteria: |
  The diff must ONLY replace direct dependency instantiation with constructor injection.
  REJECT if: business logic changed, interfaces invented not present in dep_context,
  public method signatures modified, or runtime behavior different.
  APPROVE if: new ConcreteService() was replaced by injection and the field is private final.
