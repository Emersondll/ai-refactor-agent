skill: dry-check
description: Identify repeated code in 2+ files and extract into utility classes (DRY principle)
tool: flow-dry
skill_name: java-dry-extraction
skill_section: LLM INSTRUCTIONS
review_criteria: |
  The diff must ONLY extract identical or near-identical code into static utility classes.
  REJECT if: business logic changed, behavior of any method different,
  instance methods incorrectly converted to static,
  or if the extraction reduces readability with more than 3 parameters.
