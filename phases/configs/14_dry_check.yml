skill: dry-check
description: Identifica código repetido em 2+ arquivos e extrai para classes utilitárias (DRY principle)
tool: flow-dry
skill_name: java-dry-extraction
skill_section: LLM INSTRUCTIONS
review_criteria: |
  O diff deve APENAS extrair código idêntico ou quase-idêntico para classes utilitárias static.
  REJEITE se: lógica de negócio alterada, comportamento de qualquer método diferente,
  métodos de instância convertidos erroneamente para estático,
  ou se a extração reduz legibilidade com mais de 3 parâmetros.
